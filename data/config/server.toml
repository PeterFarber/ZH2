[app]
sleep_when_idle = true

[server]
name = "Local Hockey Server"
tick_rate = 60
max_players = 8
port = 27020

[scene]
startup_scene = "data/raw/scenes/main_rink.scene.yaml"
validate_on_load = true

[physics]
fixed_delta_seconds = 0.0166666667
gravity_x = 0.0
gravity_y = -9.81
gravity_z = 0.0
enable_debug_draw = false
enable_sleeping = true
deterministic_mode = true

[gameplay]
enabled = true
authoritative = true
target_player_count = 8
skaters_per_team = 3
goalies_per_team = 1
period_length_seconds = 180.0
period_count = 3
pregame_countdown_seconds = 10.0
countdown_beep_start_seconds = 4.0
faceoff_delay_seconds = 1.0
goal_detection_radius = 1.0
require_puck_for_goal = true
log_gameplay_events = true
