[app]
name = 'Hockey Map Editor'
target_fps = 0

[assets]
auto_cook_dirty = false
auto_discover = false
auto_import = false
hot_reload = false

[gameplay]
debug_draw_gameplay = true
preview_enabled = false
validate_on_load = true

[input]
gamepad_enabled = true
mouse_capture = false

[physics]
enable_debug_draw = true
enable_sleeping = true
fixed_delta_seconds = 0.0166666667
gravity_x = 0.0
gravity_y = -9.81
gravity_z = 0.0
preview_simulation = false

[renderer]
anisotropy = 16
anti_aliasing = 'FXAA'
ao_quality = 'Ultra'
arena_detail = 'Ultra'
bloom = true
board_glass_detail = 'Ultra'
brightness = 1.0
chromatic_aberration = false
contact_shadows = true
crowd_quality = 'High'
depth_of_field = true
display_mode = 'Windowed'
dynamic_resolution = true
field_of_view = 50.0
film_grain = false
fps_limit = 0
global_illumination_quality = 'Ultra'
max_rendered_lights = 16
max_local_shadow_tiles = 16
directional_shadow_atlas_resolution = 0
local_shadow_atlas_resolution = 0
shadow_cascade_count = 0
shadow_cascade_split_lambda = 0.95
shadow_cascade_overlap_scale = 0.25
shadow_cascade_min_overlap = 4.0
shadow_cascade_max_overlap_scale = 0.1
shadow_cascade_blend_scale = 0.12
shadow_cascade_min_blend = 0.75
directional_shadow_pcf_radius = 1
directional_shadow_normal_offset_scale = 0.75
directional_shadow_normal_offset_min = 0.003
directional_shadow_normal_offset_max = 0.03
directional_shadow_bias_base = 0.00045
directional_shadow_bias_slope = 0.0018
directional_shadow_bias_min = 0.00045
directional_shadow_bias_max = 0.003
directional_shadow_depth_bias_constant = 1.25
directional_shadow_depth_bias_slope = 1.75
contact_shadow_distance = 35.0
contact_shadow_strength = 0.75
contact_shadow_normal_offset_scale = 0.2
contact_shadow_normal_offset_min = 0.0015
contact_shadow_bias_base = 0.00012
contact_shadow_bias_slope = 0.0008
contact_shadow_bias_min = 0.00012
contact_shadow_bias_max = 0.0012
local_shadow_pcf_radius = 1
local_shadow_bias_scale = 0.0012
local_shadow_bias_min = 0.0002
local_shadow_bias_max = 0.004
goal_net_quality = 'Ultra'
hdr = true
ice_quality = 'Ultra'
ice_reflection_quality = 'Ultra'
ice_scratch_quality = 'Ultra'
jersey_quality = 'Ultra'
lens_flare = true
lod_distance_multiplier = 1.0
material_quality = 'Ultra'
model_quality = 'Ultra'
monitor_index = 0
motion_blur = false
particle_quality = 'Ultra'
preset = 'Custom'
puck_trail_quality = 'High'
reflection_quality = 'Ultra'
refresh_rate = 60
render_scale = 1.0
resolution_height = 1440
resolution_width = 2560
shadow_distance = 2000.0
shadow_quality = 'Ultra'
sharpening = 1.1299999952316284
show_fps = true
show_frame_time = true
show_gpu_stats = true
show_network_stats = true
skate_spray_quality = 'Ultra'
texture_quality = 'Ultra'
texture_streaming_budget_mb = 4096
tone_mapper = 'ACES'
upscaler = 'FSR'
vignette = true
volumetric_lighting = 'Ultra'
vsync = false

[scene]
autosave_enabled = true
autosave_interval_seconds = 120

[window]
height = 900
maximized = true
resizable = true
start_centered = true
title = 'Hockey Map Editor'
width = 1600
