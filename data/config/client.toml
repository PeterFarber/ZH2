[app]
name = "Hockey Game Client"
target_fps = 0

[window]
title = "Hockey Game"
width = 1920
height = 1080
resizable = true
maximized = false
start_centered = true

[input]
gamepad_enabled = true
mouse_capture = false

[renderer]
vsync = true
preset = "High"
shadow_quality = "High"
shadow_distance = 100.0
ao_quality = "High"
anti_aliasing = "FXAA"
tone_mapper = "ACES"
bloom = true
brightness = 1.0
anisotropy = 16

[scene]
startup_scene = "data/raw/scenes/main_rink.scene.yaml"

[physics]
fixed_delta_seconds = 0.0166666667
gravity_x = 0.0
gravity_y = -9.81
gravity_z = 0.0
enable_debug_draw = false
enable_sleeping = true

[gameplay]
enabled = true
local_play = true
debug_draw_gameplay = false
log_gameplay_events = false

[assets]
# The client loads cooked assets only; cooking is owned by the editor/asset tool.
auto_discover = false
auto_import = false
auto_cook_dirty = false
hot_reload = false
